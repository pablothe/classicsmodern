<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Player - Crime and Punishment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        .book-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .book-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .book-author {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }

        .book-chapter {
            font-size: 14px;
            color: #999;
        }

        .cover-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #667eea;
            transition: transform 0.1s, color 0.2s;
            padding: 10px;
        }

        .control-btn:hover {
            transform: scale(1.1);
            color: #764ba2;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .play-btn {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speed-control {
            margin: 20px 0;
            text-align: center;
        }

        .speed-control label {
            font-size: 14px;
            color: #666;
            margin-right: 10px;
        }

        .speed-select {
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .playlist {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .playlist-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .playlist-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: #f5f5f5;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .part-number {
            font-weight: bold;
            margin-right: 10px;
        }

        .status-indicator {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="book-info">
            <div class="cover-art">📖</div>
            <div class="book-title">Crimen y Castigo</div>
            <div class="book-author">Fiódor Dostoievski</div>
            <div class="book-chapter" id="currentChapter">Capítulo 1 - Parte <span id="partNumber">1</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prevBtn" title="Previous (15s)">⏮️</button>
            <button class="control-btn play-btn" id="playBtn" title="Play/Pause">▶️</button>
            <button class="control-btn" id="nextBtn" title="Next (15s)">⏭️</button>
        </div>

        <div class="speed-control">
            <label for="speedSelect">Velocidad:</label>
            <select id="speedSelect" class="speed-select">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>

        <div class="playlist">
            <div class="playlist-title">Partes del Capítulo</div>
            <div id="playlistContainer"></div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Audio playlist - UPDATE THIS PATH
        const audioFiles = [
            'chunk_001_modern_spanish_4b_part001_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part002_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part003_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part004_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part005_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part006_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part007_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part008_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part009_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part010_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part011_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part012_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part013_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part014_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part015_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part016_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part017_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part018_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part019_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part020_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part021_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part022_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part023_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part024_fable_20260102_153057.mp3',
            'chunk_001_modern_spanish_4b_part025_fable_20260102_153057.mp3'
        ];

        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const speedSelect = document.getElementById('speedSelect');
        const partNumberEl = document.getElementById('partNumber');
        const playlistContainer = document.getElementById('playlistContainer');

        let currentTrack = 0;
        let isPlaying = false;

        // Initialize
        function init() {
            loadTrack(0);
            createPlaylist();
            loadProgress();
        }

        // Load track
        function loadTrack(index) {
            if (index < 0 || index >= audioFiles.length) return;
            currentTrack = index;
            audioPlayer.src = audioFiles[index];
            partNumberEl.textContent = index + 1;
            updatePlaylist();
            saveProgress();
        }

        // Create playlist UI
        function createPlaylist() {
            playlistContainer.innerHTML = '';
            audioFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <span><span class="part-number">Parte ${index + 1}</span></span>
                    <span class="status-indicator" id="status-${index}"></span>
                `;
                item.onclick = () => {
                    loadTrack(index);
                    play();
                };
                playlistContainer.appendChild(item);
            });
        }

        // Update playlist active state
        function updatePlaylist() {
            document.querySelectorAll('.playlist-item').forEach((item, index) => {
                item.classList.toggle('active', index === currentTrack);
            });
        }

        // Play/Pause
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function play() {
            audioPlayer.play();
            isPlaying = true;
            playBtn.textContent = '⏸️';
        }

        function pause() {
            audioPlayer.pause();
            isPlaying = false;
            playBtn.textContent = '▶️';
        }

        // Skip functions
        function skip(seconds) {
            audioPlayer.currentTime += seconds;
        }

        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Progress saving
        function saveProgress() {
            localStorage.setItem('audiobook_track', currentTrack);
            localStorage.setItem('audiobook_time', audioPlayer.currentTime);
        }

        function loadProgress() {
            const savedTrack = localStorage.getItem('audiobook_track');
            const savedTime = localStorage.getItem('audiobook_time');
            if (savedTrack !== null) {
                loadTrack(parseInt(savedTrack));
                if (savedTime !== null) {
                    audioPlayer.currentTime = parseFloat(savedTime);
                }
            }
        }

        // Event listeners
        playBtn.onclick = togglePlay;
        prevBtn.onclick = () => skip(-15);
        nextBtn.onclick = () => skip(15);

        audioPlayer.ontimeupdate = () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = progress + '%';
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            totalTimeEl.textContent = formatTime(audioPlayer.duration);

            // Auto-save progress every 10 seconds
            if (Math.floor(audioPlayer.currentTime) % 10 === 0) {
                saveProgress();
            }
        };

        audioPlayer.onended = () => {
            // Auto-play next track
            if (currentTrack < audioFiles.length - 1) {
                loadTrack(currentTrack + 1);
                play();
            } else {
                pause();
            }
        };

        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        };

        speedSelect.onchange = () => {
            audioPlayer.playbackRate = parseFloat(speedSelect.value);
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowLeft') {
                skip(-15);
            } else if (e.code === 'ArrowRight') {
                skip(15);
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
