<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Audiobook Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            color: #f0a500;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaa;
            font-style: italic;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 120px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            max-height: 70vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #f0a500;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .book-list {
            list-style: none;
        }

        .book-item {
            margin-bottom: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .book-item:hover {
            background: rgba(240, 165, 0, 0.1);
        }

        .book-item.active {
            background: rgba(240, 165, 0, 0.2);
            border-left: 3px solid #f0a500;
        }

        .book-title {
            font-weight: bold;
            color: #fff;
        }

        .book-chapters {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        .content-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
        }

        .chapter-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .chapter-card:hover {
            background: rgba(240, 165, 0, 0.15);
            border-color: #f0a500;
            transform: translateY(-2px);
        }

        .chapter-card.playing {
            border-color: #f0a500;
            background: rgba(240, 165, 0, 0.2);
        }

        .chapter-name {
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #fff;
        }

        .chapter-tracks {
            font-size: 0.85em;
            color: #aaa;
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            padding: 40px;
            font-style: italic;
        }

        /* Player Controls */
        .player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f1e;
            border-top: 2px solid #f0a500;
            padding: 20px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .player-info {
            max-width: 1200px;
            margin: 0 auto 15px;
            text-align: center;
        }

        .now-playing {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .track-title {
            font-size: 1.2em;
            color: #f0a500;
            font-weight: bold;
        }

        .player-controls {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background: #f0a500;
            border: none;
            color: #0f0f1e;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #ffc04d;
            transform: scale(1.05);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: scale(1);
        }

        .progress-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #f0a500;
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 100px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #f0a500;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffc04d;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .chapter-list {
                grid-template-columns: 1fr;
            }

            .player-controls {
                flex-direction: column;
                gap: 10px;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Classic Audiobooks</h1>
            <p class="subtitle">Your Personal Library of Translated Literature</p>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <h2>Library</h2>
                <ul class="book-list" id="bookList">
                    <li class="empty-state">Loading library...</li>
                </ul>
            </aside>

            <main class="content-area">
                <div id="chapterView">
                    <div class="empty-state">
                        Select a book from the library to view chapters
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="player-container">
        <div class="player-info">
            <div class="now-playing" id="nowPlaying">No track loaded</div>
            <div class="track-title" id="trackTitle">-</div>
        </div>
        <div class="player-controls">
            <div class="controls">
                <button id="prevBtn" disabled>⏮ Previous</button>
                <button id="playPauseBtn" disabled>▶ Play</button>
                <button id="nextBtn" disabled>⏭ Next</button>
            </div>
            <div class="progress-container">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // State
        let library = {};
        let currentBook = null;
        let currentChapter = null;
        let currentTrackIndex = 0;
        let currentTracks = [];

        // DOM Elements
        const bookList = document.getElementById('bookList');
        const chapterView = document.getElementById('chapterView');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const nowPlaying = document.getElementById('nowPlaying');
        const trackTitle = document.getElementById('trackTitle');

        // Load library on startup
        async function loadLibrary() {
            try {
                const response = await fetch('/api/library');
                library = await response.json();
                renderBookList();
            } catch (error) {
                console.error('Error loading library:', error);
                bookList.innerHTML = '<li class="empty-state">Error loading library</li>';
            }
        }

        // Render book list
        function renderBookList() {
            if (Object.keys(library).length === 0) {
                bookList.innerHTML = '<li class="empty-state">No audiobooks found</li>';
                return;
            }

            bookList.innerHTML = '';
            for (const [bookName, bookData] of Object.entries(library)) {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.innerHTML = `
                    <div class="book-title">${bookData.title}</div>
                    <div class="book-chapters">${bookData.chapters.length} chapters</div>
                `;
                li.onclick = () => selectBook(bookName);
                bookList.appendChild(li);
            }
        }

        // Select a book
        function selectBook(bookName) {
            currentBook = bookName;

            // Update active state
            document.querySelectorAll('.book-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            renderChapters();
        }

        // Render chapters
        function renderChapters() {
            const bookData = library[currentBook];

            chapterView.innerHTML = `
                <h2>${bookData.title}</h2>
                <div class="chapter-list" id="chapterList"></div>
            `;

            const chapterList = document.getElementById('chapterList');
            bookData.chapters.forEach((chapter, index) => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.dataset.chapterIndex = index;
                card.innerHTML = `
                    <div class="chapter-name">${chapter.name}</div>
                    <div class="chapter-tracks">${chapter.tracks.length} track${chapter.tracks.length === 1 ? '' : 's'}</div>
                `;
                card.onclick = function() { playChapter(index, this); };
                chapterList.appendChild(card);
            });
        }

        // Play a chapter
        async function playChapter(chapterIndex, cardElement) {
            const bookData = library[currentBook];
            const chapter = bookData.chapters[chapterIndex];

            currentChapter = chapterIndex;
            currentTracks = chapter.tracks;
            currentTrackIndex = 0;

            // Load saved progress
            try {
                const response = await fetch(`/api/progress/${currentBook}/${encodeURIComponent(chapter.name)}`);
                const progress = await response.json();
                currentTrackIndex = progress.track_index || 0;
            } catch (error) {
                console.error('Error loading progress:', error);
            }

            // Update UI
            document.querySelectorAll('.chapter-card').forEach(card => card.classList.remove('playing'));
            if (cardElement) cardElement.classList.add('playing');

            loadTrack();

            // Auto-play after loading
            audioPlayer.addEventListener('loadeddata', function playOnce() {
                audioPlayer.play();
                audioPlayer.removeEventListener('loadeddata', playOnce);
            });
        }

        // Load current track
        function loadTrack() {
            if (currentTracks.length === 0) return;

            const track = currentTracks[currentTrackIndex];
            audioPlayer.src = `/audio/${track}`;

            const bookData = library[currentBook];
            const chapter = bookData.chapters[currentChapter];

            nowPlaying.textContent = `${bookData.title} - ${chapter.name}`;
            trackTitle.textContent = `Track ${currentTrackIndex + 1} of ${currentTracks.length}`;

            playPauseBtn.disabled = false;
            updateNavigationButtons();
        }

        // Play/Pause
        playPauseBtn.onclick = () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = '⏸ Pause';
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶ Play';
            }
        };

        // Previous track
        prevBtn.onclick = () => {
            if (currentTrackIndex > 0) {
                currentTrackIndex--;
                loadTrack();
                audioPlayer.play();
            }
        };

        // Next track
        nextBtn.onclick = () => {
            if (currentTrackIndex < currentTracks.length - 1) {
                currentTrackIndex++;
                loadTrack();
                audioPlayer.play();
            }
        };

        // Auto-play next track when current ends
        audioPlayer.onended = () => {
            if (currentTrackIndex < currentTracks.length - 1) {
                currentTrackIndex++;
                loadTrack();
                audioPlayer.play();
            } else {
                playPauseBtn.textContent = '▶ Play';
            }
        };

        // Update navigation buttons
        function updateNavigationButtons() {
            prevBtn.disabled = currentTrackIndex === 0;
            nextBtn.disabled = currentTrackIndex === currentTracks.length - 1;
        }

        // Progress bar update
        audioPlayer.ontimeupdate = () => {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            durationEl.textContent = formatTime(audioPlayer.duration);

            // Save progress periodically
            if (audioPlayer.currentTime % 5 < 0.5) { // Every ~5 seconds
                saveProgress();
            }
        };

        // Progress bar click
        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        };

        // Volume control
        volumeSlider.oninput = () => {
            audioPlayer.volume = volumeSlider.value / 100;
        };
        audioPlayer.volume = 0.8;

        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Save progress
        async function saveProgress() {
            if (!currentBook || currentChapter === null) return;

            const bookData = library[currentBook];
            const chapter = bookData.chapters[currentChapter];

            try {
                await fetch(`/api/progress/${currentBook}/${encodeURIComponent(chapter.name)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        position: audioPlayer.currentTime,
                        track_index: currentTrackIndex
                    })
                });
            } catch (error) {
                console.error('Error saving progress:', error);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !playPauseBtn.disabled) {
                e.preventDefault();
                playPauseBtn.click();
            } else if (e.code === 'ArrowLeft') {
                audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10);
            } else if (e.code === 'ArrowRight') {
                audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 10);
            }
        });

        // Initialize
        loadLibrary();
    </script>
</body>
</html>
