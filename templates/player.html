<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -0.5px;
        }

        .header-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: #fff;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 60px;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 40px;
            height: fit-content;
        }

        .sidebar h2 {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 20px;
        }

        .book-list {
            list-style: none;
        }

        .book-item {
            padding: 12px 0;
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 1px solid #111;
        }

        .book-item:hover {
            color: #999;
        }

        .book-item.active {
            color: #fff;
        }

        .book-title {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .book-meta {
            font-size: 0.8rem;
            color: #555;
        }

        /* Main Content */
        .content {
            min-height: 400px;
        }

        .content h2 {
            font-size: 1.75rem;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1px;
            background: #111;
            border: 1px solid #111;
        }

        .chapter-card {
            background: #000;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .chapter-card:hover {
            background: #0a0a0a;
        }

        .chapter-card.playing {
            background: #fff;
            color: #000;
        }

        .chapter-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 8px;
        }

        .chapter-card.playing .chapter-number {
            color: #666;
        }

        .chapter-name {
            font-size: 1rem;
            font-weight: 400;
        }

        .empty-state {
            color: #444;
            font-size: 0.9rem;
            padding: 60px 0;
            text-align: center;
        }

        /* Player */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            border-top: 1px solid #222;
            padding: 20px;
        }

        .player-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .player-info {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .now-playing {
            font-size: 0.85rem;
            color: #666;
        }

        .track-title {
            font-size: 0.95rem;
            font-weight: 400;
        }

        .time-display {
            font-size: 0.85rem;
            color: #666;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: #222;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px 16px;
            font-size: 0.85rem;
            transition: color 0.2s;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            color: #999;
        }

        button:disabled {
            color: #333;
            cursor: not-allowed;
        }

        .play-pause {
            font-size: 1rem;
            padding: 8px 24px;
        }

        .volume-control {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-icon {
            font-size: 0.85rem;
            color: #666;
        }

        input[type="range"] {
            width: 100px;
            height: 2px;
            background: #222;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            cursor: pointer;
            border-radius: 50%;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #fff;
            cursor: pointer;
            border: none;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .sidebar {
                position: static;
            }

            .chapter-grid {
                grid-template-columns: 1fr;
            }

            .controls-row {
                flex-direction: column;
                gap: 20px;
            }

            .volume-control {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audiobooks</h1>
            <div class="header-links">
                <a href="/jobs">Jobs</a>
            </div>
        </header>

        <div class="layout">
            <aside class="sidebar">
                <h2>Library</h2>
                <ul class="book-list" id="bookList">
                    <li class="empty-state">Loading...</li>
                </ul>
            </aside>

            <main class="content">
                <div id="chapterView">
                    <div class="empty-state">Select a book to begin</div>
                </div>
            </main>
        </div>
    </div>

    <div class="player">
        <div class="player-inner">
            <div class="player-info">
                <div>
                    <div class="now-playing" id="nowPlaying">No track loaded</div>
                    <div class="track-title" id="trackTitle">—</div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                </div>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="controls-row">
                <div class="controls">
                    <button id="prevBtn" disabled>Previous</button>
                    <button id="playPauseBtn" class="play-pause" disabled>Play</button>
                    <button id="nextBtn" disabled>Next</button>
                </div>
                <div class="volume-control">
                    <span class="volume-icon">Volume</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // State
        let library = {};
        let currentBook = null;
        let currentChapter = null;
        let currentTrackIndex = 0;
        let currentTracks = [];

        // DOM Elements
        const bookList = document.getElementById('bookList');
        const chapterView = document.getElementById('chapterView');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const nowPlaying = document.getElementById('nowPlaying');
        const trackTitle = document.getElementById('trackTitle');

        // Load library
        async function loadLibrary() {
            try {
                const response = await fetch('/api/library');
                library = await response.json();
                renderBookList();
            } catch (error) {
                console.error('Error loading library:', error);
                bookList.innerHTML = '<li class="empty-state">Error loading library</li>';
            }
        }

        // Render book list
        function renderBookList() {
            if (Object.keys(library).length === 0) {
                bookList.innerHTML = '<li class="empty-state">No audiobooks found</li>';
                return;
            }

            bookList.innerHTML = '';
            for (const [bookName, bookData] of Object.entries(library)) {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.innerHTML = `
                    <div class="book-title">${bookData.title}</div>
                    <div class="book-meta">${bookData.chapters.length} chapter${bookData.chapters.length === 1 ? '' : 's'}</div>
                `;
                li.onclick = function() { selectBook(bookName, this); };
                bookList.appendChild(li);
            }
        }

        // Select book
        function selectBook(bookName, element) {
            currentBook = bookName;
            document.querySelectorAll('.book-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            renderChapters();
        }

        // Render chapters
        function renderChapters() {
            const bookData = library[currentBook];

            chapterView.innerHTML = `
                <h2>${bookData.title}</h2>
                <div class="chapter-grid" id="chapterGrid"></div>
            `;

            const chapterGrid = document.getElementById('chapterGrid');
            bookData.chapters.forEach((chapter, index) => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerHTML = `
                    <div class="chapter-number">${chapter.name}</div>
                    <div class="chapter-name">${formatDuration(0)}</div>
                `;
                card.onclick = function() { playChapter(index, this); };
                chapterGrid.appendChild(card);
            });
        }

        // Play chapter
        async function playChapter(chapterIndex, cardElement) {
            const bookData = library[currentBook];
            const chapter = bookData.chapters[chapterIndex];

            currentChapter = chapterIndex;
            currentTracks = chapter.tracks;
            currentTrackIndex = 0;

            // Load saved progress
            try {
                const response = await fetch(`/api/progress/${currentBook}/${encodeURIComponent(chapter.name)}`);
                const progress = await response.json();
                currentTrackIndex = progress.track_index || 0;
            } catch (error) {
                console.error('Error loading progress:', error);
            }

            // Update UI
            document.querySelectorAll('.chapter-card').forEach(card => card.classList.remove('playing'));
            if (cardElement) cardElement.classList.add('playing');

            loadTrack();

            // Auto-play
            audioPlayer.addEventListener('loadeddata', function playOnce() {
                audioPlayer.play();
                audioPlayer.removeEventListener('loadeddata', playOnce);
            });
        }

        // Load track
        function loadTrack() {
            if (currentTracks.length === 0) return;

            const track = currentTracks[currentTrackIndex];
            // Prepend book name if not already in path
            const audioPath = track.startsWith(currentBook) ? track : `${currentBook}/${track}`;
            audioPlayer.src = `/audio/${audioPath}`;

            const bookData = library[currentBook];
            const chapter = bookData.chapters[currentChapter];

            nowPlaying.textContent = bookData.title;
            trackTitle.textContent = chapter.name;

            playPauseBtn.disabled = false;
            updateNavigationButtons();
        }

        // Play/Pause
        playPauseBtn.onclick = () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = 'Pause';
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = 'Play';
            }
        };

        // Previous track
        prevBtn.onclick = () => {
            if (currentTrackIndex > 0) {
                currentTrackIndex--;
                loadTrack();
                audioPlayer.play();
            }
        };

        // Next track
        nextBtn.onclick = () => {
            if (currentTrackIndex < currentTracks.length - 1) {
                currentTrackIndex++;
                loadTrack();
                audioPlayer.play();
            }
        };

        // Auto-play next track
        audioPlayer.onended = () => {
            if (currentTrackIndex < currentTracks.length - 1) {
                currentTrackIndex++;
                loadTrack();
                audioPlayer.play();
            } else {
                playPauseBtn.textContent = 'Play';
            }
        };

        // Update navigation buttons
        function updateNavigationButtons() {
            prevBtn.disabled = currentTrackIndex === 0;
            nextBtn.disabled = currentTrackIndex === currentTracks.length - 1;
        }

        // Progress bar update
        audioPlayer.ontimeupdate = () => {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            durationEl.textContent = formatTime(audioPlayer.duration);

            // Save progress periodically
            if (audioPlayer.currentTime % 5 < 0.5) {
                saveProgress();
            }
        };

        // Progress bar click
        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        };

        // Volume control
        volumeSlider.oninput = () => {
            audioPlayer.volume = volumeSlider.value / 100;
        };
        audioPlayer.volume = 0.8;

        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function formatDuration(seconds) {
            if (seconds === 0) return '—';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        // Save progress
        async function saveProgress() {
            if (!currentBook || currentChapter === null) return;

            const bookData = library[currentBook];
            const chapter = bookData.chapters[currentChapter];

            try {
                await fetch(`/api/progress/${currentBook}/${encodeURIComponent(chapter.name)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        position: audioPlayer.currentTime,
                        track_index: currentTrackIndex
                    })
                });
            } catch (error) {
                console.error('Error saving progress:', error);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !playPauseBtn.disabled && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                playPauseBtn.click();
            } else if (e.code === 'ArrowLeft') {
                audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10);
            } else if (e.code === 'ArrowRight') {
                audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 10);
            }
        });

        // Initialize
        loadLibrary();
    </script>
</body>
</html>
